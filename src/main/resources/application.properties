# 1. Konfigurasi Koneksi Database
spring.datasource.url=jdbc:mysql://localhost:3306/db_perpustakaan?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# 2. Driver MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Konfigurasi Hibernate / JPA
# update: Spring akan otomatis membuat/mengupdate tabel berdasarkan Entity Java Anda
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect